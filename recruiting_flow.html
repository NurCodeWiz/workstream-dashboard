<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recruiting Flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>
<svg viewBox="0 0 900 1360" xmlns="http://www.w3.org/2000/svg" width="900">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="1360" fill="#0f0f0f"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TITLE -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="420" y="28" text-anchor="middle" fill="#666" font-size="13" font-weight="700" letter-spacing="1">RECRUITING FLOW</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- START -->
  <!-- ═══════════════════════════════════════════════ -->
  <ellipse cx="420" cy="62" rx="65" ry="28" fill="#252525" stroke="#555" stroke-width="1.5"/>
  <text x="420" y="67" text-anchor="middle" fill="#aaa" font-size="13" font-style="italic">Start</text>
  <line x1="420" y1="90" x2="420" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 1: Application -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="111" width="240" height="84" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="133" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">Application</text>
  <text x="420" y="152" text-anchor="middle" fill="#888" font-size="11">Website + LinkedIn → Airtable</text>
  <text x="420" y="168" text-anchor="middle" fill="#666" font-size="10">LinkedIn: Claude script runs daily</text>
  <text x="420" y="184" text-anchor="middle" fill="#666" font-size="10">All candidates also added to LuckyHiring</text>
  <line x1="420" y1="195" x2="420" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 2: AI Scoring -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="216" width="240" height="60" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="238" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">AI Scoring</text>
  <text x="420" y="256" text-anchor="middle" fill="#888" font-size="11">AI scores candidate based on role</text>
  <!-- owner -->
  <rect x="552" y="224" width="45" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="574" y="237" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Nur</text>
  <line x1="420" y1="276" x2="420" y2="296" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DECISION 1: Invite to screening? -->
  <!-- diamond center (420, 333), hw=80, hh=37 -->
  <!-- ═══════════════════════════════════════════════ -->
  <polygon points="420,296 500,333 420,370 340,333" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="328" text-anchor="middle" fill="#d4d4d4" font-size="12">Invite to</text>
  <text x="420" y="344" text-anchor="middle" fill="#d4d4d4" font-size="12">screening?</text>
  <!-- yes → down -->
  <line x1="420" y1="370" x2="420" y2="393" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="404" y="385" fill="#888" font-size="11">yes</text>
  <!-- no → left rail -->
  <line x1="340" y1="333" x2="180" y2="333" stroke="#555" stroke-width="1.5"/>
  <text x="285" y="326" fill="#888" font-size="11">no</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 3: Zoom Screening -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="394" width="240" height="76" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="417" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">Zoom Screening</text>
  <text x="420" y="436" text-anchor="middle" fill="#888" font-size="11">Run screening · fill score sheet</text>
  <text x="420" y="453" text-anchor="middle" fill="#666" font-size="10">Upload recording + feedback to Airtable</text>
  <!-- owner -->
  <rect x="552" y="402" width="45" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="574" y="415" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Nur</text>
  <line x1="420" y1="470" x2="420" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DECISION 2: Performed well? -->
  <!-- diamond center (420, 527), hw=80, hh=37 -->
  <!-- ═══════════════════════════════════════════════ -->
  <polygon points="420,490 500,527 420,564 340,527" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="522" text-anchor="middle" fill="#d4d4d4" font-size="12">Performed</text>
  <text x="420" y="538" text-anchor="middle" fill="#d4d4d4" font-size="12">well?</text>
  <!-- yes → down -->
  <line x1="420" y1="564" x2="420" y2="587" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="404" y="579" fill="#888" font-size="11">yes</text>
  <!-- no → left rail -->
  <line x1="340" y1="527" x2="180" y2="527" stroke="#555" stroke-width="1.5"/>
  <text x="285" y="520" fill="#888" font-size="11">no</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 4: Manager Review -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="588" width="240" height="62" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="611" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">Manager Review</text>
  <text x="420" y="630" text-anchor="middle" fill="#888" font-size="11">Share candidate + evaluation</text>
  <!-- owner -->
  <rect x="552" y="597" width="45" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="574" y="610" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Nur</text>
  <line x1="420" y1="650" x2="420" y2="670" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DECISION 3: Manager Decision -->
  <!-- diamond center (420, 707), hw=80, hh=37 -->
  <!-- ═══════════════════════════════════════════════ -->
  <polygon points="420,670 500,707 420,744 340,707" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="702" text-anchor="middle" fill="#d4d4d4" font-size="12">Manager</text>
  <text x="420" y="718" text-anchor="middle" fill="#d4d4d4" font-size="12">Decision?</text>
  <!-- yes → down -->
  <line x1="420" y1="744" x2="420" y2="767" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="404" y="759" fill="#888" font-size="11">yes</text>
  <!-- no → left rail -->
  <line x1="340" y1="707" x2="180" y2="707" stroke="#555" stroke-width="1.5"/>
  <text x="285" y="700" fill="#888" font-size="11">no</text>
  <!-- owner for this stage -->
  <rect x="552" y="679" width="130" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="617" y="692" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Yan · Harrison</text>
  <!-- AI/ML note -->
  <rect x="522" y="703" width="175" height="32" rx="6" fill="#7c3aed11" stroke="#7c3aed33"/>
  <text x="609" y="717" text-anchor="middle" fill="#a78bfa" font-size="10">AI/ML role: take-home</text>
  <text x="609" y="729" text-anchor="middle" fill="#a78bfa" font-size="10">task given before interview</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 5: Technical Interview → 1:1 with Devrim -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="768" width="240" height="72" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="420" y="792" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">Technical Interview</text>
  <text x="420" y="810" text-anchor="middle" fill="#888" font-size="11">→ 1:1 with Devrim</text>
  <text x="420" y="828" text-anchor="middle" fill="#666" font-size="10">Candidates who pass advance to CEO round</text>
  <!-- owner -->
  <rect x="552" y="778" width="130" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="617" y="791" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Yan · Harrison</text>
  <line x1="420" y1="840" x2="420" y2="860" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 6: Offer -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="300" y="861" width="240" height="60" rx="8" fill="#1c1c1c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="884" text-anchor="middle" fill="#d4d4d4" font-size="13" font-weight="600">Offer</text>
  <text x="420" y="902" text-anchor="middle" fill="#888" font-size="11">Offer sent based on final decision</text>
  <!-- owner -->
  <rect x="552" y="869" width="115" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="609" y="882" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Devrim · Artia</text>
  <line x1="420" y1="921" x2="420" y2="944" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- END — Hired -->
  <!-- ═══════════════════════════════════════════════ -->
  <ellipse cx="420" cy="972" rx="65" ry="28" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="977" text-anchor="middle" fill="#22c55e" font-size="13" font-style="italic" font-weight="600">Hired</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT REJECTION RAIL -->
  <!-- x=180, from y=333 (D1) down to y=1095 -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="180" y1="333" x2="180" y2="1095" stroke="#555" stroke-width="1.5"/>
  <!-- D2 and D3 connections to rail already drawn -->

  <!-- Rail → Reject box -->
  <line x1="180" y1="1095" x2="155" y2="1095" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Reject candidate box ── -->
  <rect x="15" y="1074" width="170" height="44" rx="8" fill="#1c1c1c" stroke="#ef444455" stroke-width="1.5"/>
  <text x="100" y="1094" text-anchor="middle" fill="#d4d4d4" font-size="12">Reject candidate</text>
  <text x="100" y="1109" text-anchor="middle" fill="#888" font-size="10">(update Airtable)</text>
  <!-- rejected badge -->
  <rect x="192" y="1081" width="72" height="20" rx="4" fill="#ef444418" stroke="#ef444455"/>
  <text x="228" y="1095" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">+ rejected</text>

  <line x1="100" y1="1118" x2="100" y2="1140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Send rejection email box ── -->
  <rect x="15" y="1141" width="170" height="44" rx="8" fill="#1c1c1c" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="1161" text-anchor="middle" fill="#d4d4d4" font-size="12">Send rejection email</text>
  <!-- owner -->
  <rect x="50" y="1168" width="45" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="72" y="1181" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Nur</text>

  <!-- Arrow rejection email → END (rejected) -->
  <line x1="100" y1="1185" x2="100" y2="1238" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- END — Rejected -->
  <ellipse cx="100" cy="1266" rx="65" ry="28" fill="#2a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="100" y="1271" text-anchor="middle" fill="#888" font-size="13" font-style="italic">End</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- OWNER LEGEND (right column) -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="720" y="120" fill="#666" font-size="11" font-weight="700" letter-spacing="0.5">OWNERS</text>

  <rect x="720" y="132" width="45" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="742" y="145" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Nur</text>
  <text x="772" y="145" fill="#555" font-size="10">Operations</text>

  <rect x="720" y="158" width="130" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="785" y="171" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Yan · Harrison</text>
  <text x="720" y="188" fill="#555" font-size="10">Manager review</text>

  <rect x="720" y="196" width="115" height="18" rx="9" fill="#0ea5e912" stroke="#0ea5e930"/>
  <text x="777" y="209" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Devrim · Artia</text>
  <text x="720" y="226" fill="#555" font-size="10">Final offer</text>

  <line x1="720" y1="240" x2="860" y2="240" stroke="#2a2a2a" stroke-width="1"/>

  <text x="720" y="262" fill="#666" font-size="11" font-weight="700" letter-spacing="0.5">PATH GUIDE</text>
  <line x1="720" y1="276" x2="740" y2="276" stroke="#555" stroke-width="1.5"/>
  <text x="748" y="280" fill="#555" font-size="10">yes → continue</text>
  <line x1="720" y1="294" x2="740" y2="294" stroke="#555" stroke-width="1.5"/>
  <text x="748" y="298" fill="#555" font-size="10">no → reject rail (left)</text>

  <line x1="720" y1="312" x2="860" y2="312" stroke="#2a2a2a" stroke-width="1"/>

  <text x="720" y="334" fill="#666" font-size="11" font-weight="700" letter-spacing="0.5">SHAPES</text>
  <ellipse cx="740" cy="354" rx="18" ry="11" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="766" y="358" fill="#555" font-size="10">Start / End</text>
  <rect x="722" y="372" width="36" height="20" rx="4" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="766" y="386" fill="#555" font-size="10">Process step</text>
  <polygon points="740,404 758,416 740,428 722,416" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="766" y="420" fill="#555" font-size="10">Decision</text>

</svg>
</body>
</html>
